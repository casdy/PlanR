<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>PlanR</title>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:white;color:red;padding:20px;z-index:99999;font-family:monospace;overflow:auto;';
        div.innerHTML = '<h1>Critical Error</h1><p>' + msg + '</p><pre>' + (error && error.stack ? error.stack : 'No stack trace available') + '</pre><p>URL: ' + url + ' Line: ' + line + '</p>';
        document.body.appendChild(div);
      };
      console.log('Diagnostic script loaded');
    </script>
    <style>
      body {
        margin: 0;
        background-color: #09090b; /* zinc-950 to match dark mode loader */
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#050505;color:#3b82f6;font-family:sans-serif;font-weight:bold;">
        Loading PlanR...
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
